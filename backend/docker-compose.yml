services:
  nats:
    image: nats:2.12.4-alpine3.22
    ports:
      - "4222:4222"
    command: ["-js", "-sd", "/data"]
    volumes:
      - ./nats_data:/data

  backend:
    image: zukidocker/chat-backend:latest
    ports:
      - "1234:1234"
    environment:
      - DB_NAME=${CHAT_DB_NAME}
      - DB_USER=${CHAT_DB_USER}
      - DB_HOST=${CHAT_DB_HOST}
      - DB_PASSWORD=${CHAT_DB_PASSWORD}
      - DB_SSLMODE=disable
      - BACKEND_LISTEN_ADDRESS=:1234
      - JWT_SECRET=${JWT_SECRET}
      - NATS_URL=nats://nats:4222
      - GATEWAY_PUBLIC_URL=${GATEWAY_PUBLIC_URL}
      - GITHUB_OAUTH_CLIENT_ID=${GITHUB_OAUTH_CLIENT_ID}
      - GITHUB_OAUTH_CLIENT_SECRET=${GITHUB_OAUTH_CLIENT_SECRET}
      - CHAT_MAX_AGE=24h
    depends_on:
      - nats

  gateway:
    image: zukidocker/chat-gateway:latest
    ports:
      - "8080:8080"
    depends_on:
      - backend
      - nats
    environment:
      - BACKEND_LISTEN_ADDRESS=backend:1234
      - FRONTEND_URL=${FRONTEND_URL}
      - NATS_URL=nats://nats:4222