syntax = "proto3";

package chat;

option go_package = "proto/chat/";

message CreateConversationRequest {
  bool is_group = 1;
  string name = 2;
  repeated string members_username = 3;
}

message CreateConversationResponse {
  int64 conversation_id = 1;
}

message SendMessageRequest {
  int64  conversation_id      = 1;
  string content              = 2;
  string message_type         = 3; // "text" | "image" | "file" | "audio" (default: "text")
  optional int64 reply_to_message_id = 4;
}

message SendMessageResponse {
  int64 message_id = 1;
}

message Message {
  int64  message_id          = 1;
  string sender_id           = 2;
  string content             = 3;
  string message_type        = 4;
  int64  reply_to_message_id = 5; // 0 if no reply
  bool   is_edited           = 6;
  string created_at          = 7;
}

// GetMessagesRequest fetches messages using cursor-based pagination.
// limit defaults to 50 on the server side if not set (max 100).
// Pass next_cursor from a previous response to fetch the next page.
message GetMessagesRequest {
  int64  conversation_id = 1;
  int32  limit           = 2;
  int64  cursor          = 3;
}

message GetMessagesResponse {
  repeated Message messages = 1;
  int64 next_cursor         = 2;
}

message UpdateLastReadMessageRequest {
  int64 conversation_id = 1;
  int64 message_id       = 2;
}

message UpdateMessageRequest {
  int64   conversation_id = 1;
  int64   message_id      = 2;
  string  user_id      = 3;
}

message UpdateMessageResponse {}

service Chat {
  rpc CreateConversation(CreateConversationRequest) returns (CreateConversationResponse);
  rpc SendMessage(SendMessageRequest) returns (SendMessageResponse);
  rpc GetMessages(GetMessagesRequest) returns (GetMessagesResponse);
  rpc UpdateLastReadMessage(UpdateMessageRequest) returns (UpdateMessageResponse);
  rpc UpdateLastDeliveredMessage(UpdateMessageRequest) returns (UpdateMessageResponse);
}
