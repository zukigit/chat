syntax = "proto3";

package auth;

option go_package = "proto/auth/";

message LoginRequest {
  string userName = 1;
  string passwd = 2;
}

message LoginResponse {
  string token = 1;
}

message SignupRequest {
  string userName = 1;
  string passwd = 2;
}

message SignupResponse {}

message SearchUsersRequest {
  string query = 1;
}

message UserResult {
  string user_id = 1;
  string user_name = 2;
  string display_name = 3;
  string avatar_url = 4;
  string friendship_status = 5;
  string friendship_initiator_userid = 6;
}

message SearchUsersResponse {
  repeated UserResult users = 1;
}

// --- GitHub OAuth ---

message GetGithubOAuthURLRequest {
  // No fields. The gateway/backend knows its own callback URL from configuration.
}

message GetGithubOAuthURLResponse {
  string url = 1;
}

message GithubOAuthCallbackRequest {
  string code = 1;
}

message GithubOAuthCallbackResponse {
  string shortLivedToken = 1;
  string username = 2;
}

// --- Token Exchange ---

message ExchangeTokenRequest {
  // Token arrives via gRPC metadata (Authorization: Bearer <short_lived_token>).
  // No body fields needed.
}

message ExchangeTokenResponse {
  string token = 1;     // long-lived JWT (24h)
  string username = 2;
}

// --- E2EE Key Management ---

message SetupKeysRequest {
  string public_key = 1;                // age X25519 public key (age1...)
  string encrypted_private_key = 2;     // PIN-encrypted private key (base64)
}

message SetupKeysResponse {
  bool is_e2ee_ready = 1;
}

message GetMyKeysRequest {
  // No fields — user ID is extracted from the JWT in the gRPC context.
}

message GetMyKeysResponse {
  string encrypted_private_key = 1;      // base64-encoded PIN-encrypted private key
  string public_key = 2;                // age X25519 public key
  bool is_e2ee_ready = 3;
}

message GetPublicKeysRequest {
  repeated string user_ids = 1;          // UUIDs of users whose public keys to fetch
}

message PublicKeyEntry {
  string user_id = 1;
  string public_key = 2;                // age X25519 public key
}

message GetPublicKeysResponse {
  repeated PublicKeyEntry keys = 1;
}

service Auth {
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc Signup(SignupRequest) returns (SignupResponse);
  rpc SearchUsers(SearchUsersRequest) returns (SearchUsersResponse);
  rpc GetGithubOAuthURL(GetGithubOAuthURLRequest) returns (GetGithubOAuthURLResponse);
  rpc GithubOAuthCallback(GithubOAuthCallbackRequest) returns (GithubOAuthCallbackResponse);
  rpc ExchangeToken(ExchangeTokenRequest) returns (ExchangeTokenResponse);
  rpc SetupKeys(SetupKeysRequest) returns (SetupKeysResponse);
  rpc GetMyKeys(GetMyKeysRequest) returns (GetMyKeysResponse);
  rpc GetPublicKeys(GetPublicKeysRequest) returns (GetPublicKeysResponse);
}
