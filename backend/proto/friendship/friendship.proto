syntax = "proto3";

package friendship;

option go_package = "proto/friendship/";

message FriendRequest {
  string target_username = 1;
}

message FriendResponse {
  string status = 1;
}

message GetFriendsRequest {}

message Friend {
  string user_id    = 1;
  string username   = 2;
  string display_name = 3;
  string avatar_url = 4;
  string status     = 5;
}

message GetFriendsResponse {
  repeated Friend friends = 1;
}

service Friendship {
  rpc SendFriendRequest(FriendRequest) returns (FriendResponse);
  rpc AcceptFriendRequest(FriendRequest) returns (FriendResponse);
  rpc RejectFriendRequest(FriendRequest) returns (FriendResponse);
  rpc GetFriends(GetFriendsRequest) returns (GetFriendsResponse);
}
