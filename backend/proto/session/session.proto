syntax = "proto3";

package session;

option go_package = "proto/session/";

message GetListenPathRequest {
  string type = 1; // "chat" or "notification"
}

message GetListenPathResponse {
  string listen_path = 1;
  string consumer_name = 2;
}

message PingRequest {}

message PingResponse {
  string message = 1;
}

service Session {
  rpc GetListenPath(GetListenPathRequest) returns (GetListenPathResponse);
  rpc Ping(PingRequest) returns (PingResponse);
}
