syntax = "proto3";

package session;

option go_package = "proto/session/";

message AddSessionRequest {
  string type = 1;
}

message AddSessionResponse {
  string listen_path = 1;
}

message SetSessionStatusRequest {
  string status = 1;
}

message SetSessionStatusResponse {}

service Session {
  rpc AddSession(AddSessionRequest) returns (AddSessionResponse);
  rpc SetSessionStatus(SetSessionStatusRequest) returns (SetSessionStatusResponse);
}
