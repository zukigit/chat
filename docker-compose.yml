services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=chat
      - POSTGRES_PASSWORD=${CHAT_DB_PASSWORD}
      - POSTGRES_DB=chat
    volumes:
      - ./supabase/migrations:/docker-entrypoint-initdb.d

  nats:
    image: zukidocker/chat-nats:latest
    ports:
      - "8081:8080"
    volumes:
      - ./nats_data:/data

  backend:
    image: zukidocker/chat-backend:latest
    ports:
      - "1234:1234"
    environment:
      - DB_NAME=chat
      - DB_USER=chat
      - DB_HOST=db
      - DB_PASSWORD=${CHAT_DB_PASSWORD}
      - DB_SSLMODE=disable
      - BACKEND_LISTEN_ADDRESS=:1234
      - JWT_SECRET=${JWT_SECRET}
      - NATS_URL=ws://nats:8080
      - GATEWAY_PUBLIC_URL=${GATEWAY_PUBLIC_URL}
      - GITHUB_OAUTH_CLIENT_ID=${GITHUB_OAUTH_CLIENT_ID}
      - GITHUB_OAUTH_CLIENT_SECRET=${GITHUB_OAUTH_CLIENT_SECRET}
    depends_on:
      - db
      - nats

  gateway:
    image: zukidocker/chat-gateway:latest
    ports:
      - "8080:8080"
    depends_on:
      - backend
      - nats
    environment:
      - BACKEND_LISTEN_ADDRESS=backend:1234
      - FRONTEND_URL=*
      - NATS_URL=ws://nats:8080

  web:
    image: zukidocker/chat-web:latest
    ports:
      - "80:80"
    depends_on:
      - gateway