services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=chat
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=chat
    volumes:
      - ./backend/sqls/init:/docker-entrypoint-initdb.d

  nats:
    image: nats:2.12.4-alpine3.22
    ports:
      - "4222:4222"
    command: ["-js", "-sd", "/data"]
    volumes:
      - ./nats_data:/data

  backend:
    image: zukidocker/chat-backend:latest
    ports:
      - "1234:1234"
    environment:
      - DB_HOST=db
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_SSLMODE=disable
      - BACKEND_LISTEN_ADDRESS=:1234
      - JWT_SECRET=${JWT_SECRET}
      - NATS_URL=nats://nats:4222
    depends_on:
      - db
      - nats

  gateway:
    image: zukidocker/chat-gateway:latest
    ports:
      - "8080:8080"
    depends_on:
      - backend
      - nats
    environment:
      - BACKEND_LISTEN_ADDRESS=backend:1234
      - FRONTEND_URL=*
      - NATS_URL=nats://nats:4222

  # web:
  #   image: zukidocker/chat-web:latest
  #   ports:
  #     - "80:80"
  #   depends_on:
  #     - gateway