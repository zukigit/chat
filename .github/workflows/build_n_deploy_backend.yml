name: Build and Deploy Backend

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag'
        required: true
        default: 'latest'
  workflow_call:
    inputs:
      tag:
        description: 'Version tag'
        required: true
        type: string
        default: 'latest'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend binary
        run: |
          docker run --rm -v "$(pwd)":/workspace -w /workspace golang:1.25.3-alpine3.22 sh -c "go build -o ./bin/chat_backend ./backend/cmd/backend/main.go"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: backend-binary
          path: bin/chat_backend

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: backend-binary
          path: bin/

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/cmd/backend/Dockerfile
          push: true
          tags: zukidocker/chat-backend:${{ inputs.tag || 'latest' }}
