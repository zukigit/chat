name: Build and Deploy Gateway

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag'
        required: true
        default: 'latest'
  workflow_call:
    inputs:
      tag:
        description: 'Version tag'
        required: true
        type: string
        default: 'latest'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build gateway binary
        run: |
          docker run --rm -v "$(pwd)":/workspace -w /workspace golang:1.25.3-alpine3.22 sh -c "go build -o ./bin/chat_gateway ./backend/cmd/gateway/main.go"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: gateway-binary
          path: bin/chat_gateway

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: gateway-binary
          path: bin/

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push gateway image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/cmd/gateway/Dockerfile
          push: true
          tags: zukidocker/chat-gateway:${{ inputs.tag || 'latest' }}
