name: Deploy Web

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag'
        required: true
        default: 'latest'
      gateway_url:
        description: 'Gateway URL (VITE_GATEWAY_URL)'
        required: false
        default: ''
      enable_password_auth:
        description: 'Enable password auth (VITE_ENABLE_PASSWORD_AUTH)'
        required: false
        default: 'false'
  workflow_call:
    inputs:
      tag:
        description: 'Version tag'
        required: true
        type: string
        default: 'latest'
      gateway_url:
        description: 'Gateway URL (VITE_GATEWAY_URL)'
        required: false
        type: string
        default: ''
      enable_password_auth:
        description: 'Enable password auth (VITE_ENABLE_PASSWORD_AUTH)'
        required: false
        type: string
        default: 'false'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./web/Dockerfile
          push: true
          tags: zukidocker/chat-web:${{ inputs.tag || 'latest' }}
          build-args: |
            VITE_GATEWAY_URL=${{ inputs.gateway_url }}
            VITE_ENABLE_PASSWORD_AUTH=${{ inputs.enable_password_auth }}