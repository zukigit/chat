name: Deploy All

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag'
        required: true
        default: 'latest'
      gateway_url:
        description: 'Gateway URL (VITE_GATEWAY_URL)'
        required: false
        default: ''

jobs:
  backend:
    uses: ./.github/workflows/deploy_backend.yml
    with:
      tag: ${{ inputs.tag || 'latest' }}
    secrets: inherit

  gateway:
    uses: ./.github/workflows/deploy_gateway.yml
    with:
      tag: ${{ inputs.tag || 'latest' }}
    secrets: inherit

  web:
    uses: ./.github/workflows/deploy_web.yml
    with:
      tag: ${{ inputs.tag || 'latest' }}
      gateway_url: ${{ inputs.gateway_url }}
    secrets: inherit

