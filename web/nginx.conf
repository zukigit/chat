server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # react-router-dom uses client-side routing: direct URL access (e.g. /setup)
    # would return 404 without this — nginx must serve index.html for all routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
